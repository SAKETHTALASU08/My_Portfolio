    // --- Animated Neural Graph SVG background ---
    function ConstellationBackground({ darkMode }) {
      const nodeCount = 25;
      const [nodes, setNodes] = useState([]);
      const requestRef = useRef();

      useEffect(() => {
        // Initialize nodes
        const initialNodes = Array.from({ length: nodeCount }, () => ({
          x: Math.random() * 1000,
          y: Math.random() * 1000,
          vx: (Math.random() - 0.5) * 0.8,
          vy: (Math.random() - 0.5) * 0.8,
          radius: 2 + Math.random() * 3,
          phase: Math.random() * Math.PI * 2,
          pulseSpeed: 0.002 + Math.random() * 0.003
        }));
        setNodes(initialNodes);
      }, []);

      useEffect(() => {
        if (nodes.length === 0) return;

        let currentNodes = [...nodes];
        const updatePhysics = () => {
          currentNodes = currentNodes.map(node => {
            let nx = node.x + node.vx;
            let ny = node.y + node.vy;
            let nvx = node.vx;
            let nvy = node.vy;

            // Boundary collision (bounce)
            if (nx < 0 || nx > 1000) nvx = -nvx;
            if (ny < 0 || ny > 1000) nvy = -nvy;

            nx = Math.max(0, Math.min(1000, nx));
            ny = Math.max(0, Math.min(1000, ny));

            return {
              ...node,
              x: nx,
              y: ny,
              vx: nvx,
              vy: nvy
            };
          });

          setNodes(currentNodes);
          requestRef.current = requestAnimationFrame(updatePhysics);
        };

        requestRef.current = requestAnimationFrame(updatePhysics);
        return () => cancelAnimationFrame(requestRef.current);
      }, [nodes.length === 0]);

      const lines = useMemo(() => {
        const result = [];
        const threshold = 180;
        for (let i = 0; i < nodes.length; i++) {
          for (let j = i + 1; j < nodes.length; j++) {
            const dx = nodes[i].x - nodes[j].x;
            const dy = nodes[i].y - nodes[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < threshold) {
              result.push({
                id: `${i}-${j}`,
                x1: nodes[i].x,
                y1: nodes[i].y,
                x2: nodes[j].x,
                y2: nodes[j].y,
                opacity: (1 - dist / threshold) * 0.15
              });
            }
          }
        }
        return result;
      }, [nodes]);

      const nodeColor = darkMode ? '#6366F1' : '#4F46E5';
      const lineColor = darkMode ? '#6366F1' : '#4F46E5';

      return (
        <svg
          className="absolute inset-0 w-full h-full pointer-events-none select-none z-0"
          viewBox="0 0 1000 1000"
          preserveAspectRatio="xMidYMid slice"
        >
          {lines.map(line => (
            <line
              key={line.id}
              x1={line.x1}
              y1={line.y1}
              x2={line.x2}
              y2={line.y2}
              stroke={lineColor}
              strokeWidth="1"
              strokeOpacity={line.opacity}
            />
          ))}
          {nodes.map((node, i) => {
            const pulse = 1 + Math.sin(Date.now() * node.pulseSpeed + node.phase) * 0.35;
            return (
              <g key={i}>
                <circle
                  cx={node.x}
                  cy={node.y}
                  r={node.radius * 2.5 * pulse}
                  fill={nodeColor}
                  fillOpacity={darkMode ? 0.08 : 0.04}
                />
                <circle
                  cx={node.x}
                  cy={node.y}
                  r={node.radius * pulse}
                  fill={nodeColor}
                  fillOpacity={darkMode ? 0.45 : 0.3}
                />
              </g>
            );
          })}
        </svg>
      );
    }

    // --- Main App Setup ---
    function App() {
      // Load dark mode state
      const [darkMode, setDarkMode] = useState(() => {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) return savedTheme === 'dark';
        return true; // Default is Dark Mode
      });

      useEffect(() => {
        if (darkMode) {
          document.documentElement.classList.add('dark');
          localStorage.setItem('theme', 'dark');
        } else {
          document.documentElement.classList.remove('dark');
          localStorage.setItem('theme', 'light');
        }
      }, [darkMode]);

      return (
        <MotionConfig reducedMotion="user">
          <div className="min-h-screen">
            <Navbar darkMode={darkMode} setDarkMode={setDarkMode} />
            <main className="max-w-[1100px] mx-auto">
              <Hero darkMode={darkMode} />
              <About />
              <Skills />
              <Experience />
              <Projects />
              <Certifications />
              <Leadership />
              <Education />
              <Contact />
            </main>
            <Footer />
          </div>
        </MotionConfig>
      );
    }

    // Render tree inside DOM root
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
